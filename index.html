<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalkulator Gorden Pro</title>

<style>
body{
  font-family: Arial, sans-serif;
  padding:15px;
  background:#f4f4f9;
}
.card{
  background:#fff;
  padding:20px;
  border-radius:12px;
  box-shadow:0 4px 12px rgba(0,0,0,.1);
  max-width:500px;
  margin:auto;
}
.row{
  display:flex;
  gap:10px;
  margin-bottom:10px;
}
.form-group{
  flex:1;
  margin-bottom:10px;
}
label{
  font-weight:bold;
  font-size:13px;
  display:block;
  margin-bottom:5px;
}
input,select{
  width:100%;
  padding:10px;
  border:1px solid #ccc;
  border-radius:6px;
}
button{
  width:100%;
  padding:15px;
  background:#28a745;
  color:#fff;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="card">
  <div class="row">
    <div class="form-group">
      <label>Lebar (m)</label>
      <input type="number" id="lebar" value="1" step="0.1">
    </div>
    <div class="form-group">
      <label>Tinggi (m)</label>
      <input type="number" id="tinggi" value="2" step="0.1">
    </div>
  </div>

  <div class="form-group">
    <label>Jenis Kain</label>
    <select id="jenisKain">
      <option value="import">Kain Import</option>
      <option value="lokal">Kain Lokal</option>
      <option value="vitras">Kain Vitrase</option>
    </select>
  </div>

  <div class="row">
    <div class="form-group">
      <label>Harga Kain / m</label>
      <input type="number" id="hKain" value="150000">
    </div>
    <div class="form-group">
      <label>Harga Vitras / m</label>
      <input type="number" id="hVit" value="100000">
    </div>
  </div>

  <div class="form-group">
    <label>Instalasi (Total)</label>
    <input type="number" id="ins" value="50000">
  </div>

  <div class="form-group">
    <label>Model Gorden</label>
    <select id="model">
      <option value="smokring">Smokring</option>
      <option value="plisket">Plisket</option>
      <option value="spiral">Spiral</option>
    </select>
  </div>

  <div class="form-group">
    <label>Tambah Vitrase?</label>
    <select id="pakaiVitras" onchange="toggleVitrase()">
      <option value="tidak">Tidak</option>
      <option value="ya">Ya</option>
    </select>
  </div>

  <div id="vitrasOptions" style="display:none;background:#eee;padding:10px;border-radius:6px;">
    <div class="form-group">
      <label>Model Vitras</label>
      <select id="modelVitras" onchange="toggleVitrase()">
        <option value="plisket">Plisket (Rel)</option>
        <option value="spiral">Spiral (Stik)</option>
      </select>
    </div>

    <div id="spiralInputs" style="display:none;">
      <div class="row">
        <div class="form-group">
          <label>Qty</label>
          <input type="number" id="vQty" value="1">
        </div>
        <div class="form-group">
          <label>Lebar Vitras</label>
          <input type="number" id="vLebar" value="0.7" step="0.1">
        </div>
        <div class="form-group">
          <label>Tinggi Vitras</label>
          <input type="number" id="vTinggi" value="1.7" step="0.1">
        </div>
      </div>
    </div>
  </div>

  <button onclick="hitung()">HITUNG & CETAK NOTA</button>
</div>

<script>
function toggleVitrase(){
  const pakai = document.getElementById("pakaiVitras").value === "ya";
  const model = document.getElementById("modelVitras").value;
  document.getElementById("vitrasOptions").style.display = pakai ? "block" : "none";
  document.getElementById("spiralInputs").style.display = (pakai && model==="spiral") ? "block" : "none";
}

function kirimKeSheet(nota,total){
  fetch("https://script.google.com/macros/s/AKfycbwy2Pl8NzS34ABLhbra5esPR0-GBTzsNycC12USoxU4M6hupbSiCSXTCbzj2pdTa6-h/exec",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({nota:nota,total:total})
  });
}

function hitung(){
  const L = parseFloat(lebar.value);
  const T = parseFloat(tinggi.value);
  const hK = parseFloat(hKain.value);
  const hV = parseFloat(hVit.value);
  const ins = parseFloat(ins.value);
  const jenis = jenisKain.value;
  const model = document.getElementById("model").value;
  const pakai = pakaiVitras.value === "ya";

  let kain = 0;
  if(jenis==="lokal"){
    kain = Math.ceil((L+0.2)/0.4)*(T+0.3);
  }else{
    kain = (L+0.2)*3;
  }

  let total = kain*hK + kain*20000 + ins;
  let nota = "NOTA GORDEN\n---------------------\n";
  nota += `Kain: ${kain.toFixed(2)} m\n`;

  if(model==="smokring"){
    const smk = Math.ceil(L*24/2)*2;
    total += smk*4500 + L*65000 + 75000;
  }

  if(pakai){
    if(modelVitras.value==="spiral"){
      const q = parseInt(vQty.value);
      const vk = (parseFloat(vLebar.value)+0.2)*3;
      total += ((vk*hV)+(vk*20000)+50000)*q;
    }else{
      const vk = (L+0.2)*3;
      total += (vk*hV)+(vk*20000)+(L*45000);
    }
  }

  nota += `TOTAL: Rp${total.toLocaleString()}`;
  kirimKeSheet(nota,total);

  const w = window.open("");
  w.document.write(`<pre>${nota}</pre>`);
}
</script>

</body>
</html>
