<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Estimasi Gorden</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; max-width: 500px; margin: auto; background-color: #f9f9f9; }
        .window-row { border: 1px solid #ddd; padding: 15px; margin-bottom: 15px; border-radius: 8px; background: white; }
        input { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 5px; cursor: pointer; margin-top: 10px; font-weight: bold; }
        .btn-add { background: #6c757d; color: white; }
        .btn-send { background: #25d366; color: white; font-size: 16px; }
        .footer-note { font-size: 12px; opacity: 0.8; display: block; margin-top: 5px; }
    </style>
</head>
<body>
    <h2>Estimasi Biaya Gorden</h2>
    <p>Silakan masukkan nomor WA dan ukuran jendela Anda:</p>
    
    <input type="text" id="wa" placeholder="Nomor WhatsApp (Contoh: 0812xxx)" required>
    
    <div id="windowsContainer">
        <div class="window-row">
            <input type="number" class="lebar" placeholder="Lebar Jendela (m)" step="0.1" required>
            <input type="number" class="tinggi" placeholder="Tinggi Jendela (m)" step="0.1" required>
        </div>
    </div>
    
    <button class="btn-add" onclick="tambahJendela()">+ Tambah Jendela Lain</button>
    <button class="btn-send" onclick="kirimData()">
        Kirim & Dapatkan Estimasi via WhatsApp
        <span class="footer-note">(Hasil akan dikirim dalam 1x24 jam)</span>
    </button>

    <script>
        function tambahJendela() {
            const container = document.getElementById('windowsContainer');
            const div = document.createElement('div');
            div.className = 'window-row';
            div.innerHTML = '<input type="number" class="lebar" placeholder="Lebar Jendela (m)" step="0.1"><input type="number" class="tinggi" placeholder="Tinggi Jendela (m)" step="0.1">';
            container.appendChild(div);
        }

        async function kirimData() {
            const wa = document.getElementById('wa').value;
            const rows = document.querySelectorAll('.window-row');
            let windows = [];
            
            rows.forEach(row => {
                const l = row.querySelector('.lebar').value;
                const t = row.querySelector('.tinggi').value;
                if(l && t) windows.push({ lebar: l, tinggi: t });
            });

            if(!wa || windows.length === 0) return alert("Harap isi No WA dan minimal satu ukuran jendela.");

            // GANTI URL DI BAWAH DENGAN URL WEB APP GOOGLE SCRIPT ANDA
            const url = "https://script.google.com/macros/s/AKfycbyGNos4Y8B-SWxG2T5z_vl9v3-z8MPoRI-A7A5PywRW660ZcKSmCAOXTuQrPKfzEThP/exec";

            try {
                // Memberikan feedback visual saat proses kirim
                alert('Mengirim data...');
                await fetch(url, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ wa, windows })
                });
                alert('Terima kasih! Data telah terkirim. Mohon tunggu estimasi kami dalam 1x24 jam.');
            } catch(e) {
                alert('Terjadi kesalahan, silakan coba lagi nanti.');
            }
        }
    </script>
</body>
</html>
