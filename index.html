<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Kalkulator Gorden Mbah</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background-color: #f9f9f9; }
        .container { max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; }
        label { display: block; margin-top: 15px; font-weight: bold; }
        input, select { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        
        .toggle-container { display: flex; align-items: center; justify-content: space-between; margin-top: 15px; }
        .switch { position: relative; display: inline-block; width: 50px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 24px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #28a745; }
        input:checked + .slider:before { transform: translateX(26px); }

        button { width: 100%; padding: 12px; background: #28a745; color: white; border: none; border-radius: 6px; cursor: pointer; margin-top: 20px; font-size: 16px; }
        #hasil { margin-top: 20px; display: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        table, th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        .wa-btn { background: #25d366; margin-top: 15px; text-decoration: none; display: block; text-align: center; color: white; padding: 12px; border-radius: 6px; font-weight: bold; }
        .disclaimer { font-size: 0.85em; color: #d9534f; background: #f9ebeb; padding: 10px; border-radius: 6px; margin-top: 15px; border: 1px solid #f5c6cb; }
        .small-note { font-size: 0.8em; color: #555; }
    </style>
</head>
<body>

<div class="container">
    <h2>Estimasi Harga Gorden</h2>
    
    <label>Lebar Kusen (meter):</label>
    <input type="number" id="lebar" step="0.1" value="1" oninput="hitung()">
    
    <label>Tinggi Gorden (meter):</label>
    <input type="number" id="tinggi" step="0.1" value="2" oninput="hitung()">

    <label>Jenis Kain:</label>
    <select id="jenisKain" onchange="hitung()">
        <option value="170000" data-tipe="Import">Kain Import (170rb/m)</option>
        <option value="90000" data-tipe="Lokal">Kain Lokal (90rb/m)</option>
    </select>

    <div class="toggle-container">
        <label style="margin-top:0">Dengan Vitrase?</label>
        <label class="switch">
            <input type="checkbox" id="pakaiVitras" checked onchange="hitung()">
            <span class="slider"></span>
        </label>
    </div>

    <button onclick="hitung()">Hitung Estimasi</button>

    <div id="hasil">
        <table id="tabelRincian"></table>
        <h3 id="totalHarga"></h3>
        
        <div class="disclaimer">
            <strong>Catatan Penting:</strong> <bold>Harga adalah estimasi awal. Harga akhir dapat berubah tergantung pada motif bahan, model gorden, kondisi lokasi, dan aksesoris.</bold>
        </div>

        <a id="waLink" href="#" class="wa-btn" target="_blank">Konsultasi via WhatsApp</a>
    </div>
</div>

<script>
function hitung() {
    const L = parseFloat(document.getElementById('lebar').value) || 0;
    const T = parseFloat(document.getElementById('tinggi').value) || 0;
    const hargaPaket = parseFloat(document.getElementById('jenisKain').value);
    const isVitras = document.getElementById('pakaiVitras').checked;
    const select = document.getElementById('jenisKain');
    const tipeKain = select.options[select.selectedIndex].getAttribute('data-tipe');
    
    let totalMeterKain = (tipeKain === "Lokal") ? Math.ceil((L + 0.2) / 0.4) * (T + 0.3) : (L + 0.2) * 3;
    let bKain = totalMeterKain * hargaPaket;

    const totalMeterVitras = (L + 0.2) * 3;
    const bVitrase = isVitras ? (totalMeterVitras * 120000) : 0;

    const bSmokring = Math.ceil((L * 3 * 24) / 2) * 2 * 4500;
    const bRollet = Math.max(1, Math.ceil(L)) * 65000;
    const bHook = 40000;
    const bTali = 50000;
    const bRellVitras = isVitras ? Math.max(1, Math.ceil(L)) * 50000 : 0;
    const bAksesoris = bSmokring + bRollet + bRellVitras + bHook + bTali;
    
    const total = bKain + bVitrase + bAksesoris;

    // Daftar Aksesoris yang diperbaiki
    let daftarAksesoris = isVitras ? "rollet, rell gorden, rell vitrase, smokring, hook, tali tassel" : "rollet, smokring, hook, tali tassel";

    document.getElementById('hasil').style.display = 'block';
    document.getElementById('tabelRincian').innerHTML = `
        <tr><td>Kain ${tipeKain} (${totalMeterKain.toFixed(1)}m)</td><td>Rp ${bKain.toLocaleString()}</td></tr>
        ${isVitras ? `<tr><td>Vitrase (${totalMeterVitras.toFixed(1)}m)</td><td>Rp ${bVitrase.toLocaleString()}</td></tr>` : ""}
        <tr>
            <td>Aksesoris <br><span class="small-note">(${daftarAksesoris})</span></td>
            <td>Rp ${bAksesoris.toLocaleString()}</td>
        </tr>
    `;
    document.getElementById('totalHarga').innerText = 'Total Estimasi: Rp ' + total.toLocaleString('id-ID');

    const pesan = `Halo Mbah, saya ingin konsultasi gorden ${tipeKain} ${isVitras ? "dengan vitrase" : ""} ukuran L:${L}m T:${T}m. Estimasi totalnya Rp ${total.toLocaleString()}. Bisa dibantu survei lokasi?`;
    document.getElementById('waLink').href = "https://wa.me/6289504215020?text=" + encodeURIComponent(pesan);
}
</script>
</body>
</html>
