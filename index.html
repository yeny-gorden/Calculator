<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Gorden</title>
    <style>
        /* Desain Responsif & Tema Gelap */
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: #121212; 
            color: #e0e0e0; 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            justify-content: center; 
            min-height: 100vh;
            align-items: center;
        }
        .container { 
            width: 100%; 
            max-width: 450px; 
            background: #1e1e1e; 
            padding: 25px; 
            border-radius: 16px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
        }
        h2 { color: #ffffff; text-align: center; margin-bottom: 25px; }
        label { font-weight: 500; display: block; margin-top: 15px; color: #b3b3b3; }
        
        input { 
            width: 100%; 
            padding: 14px; 
            margin: 10px 0; 
            border: 1px solid #333; 
            border-radius: 8px; 
            box-sizing: border-box; 
            background: #2c2c2c; 
            color: white; 
            font-size: 16px; 
        }
        
        button { 
            width: 100%; 
            padding: 14px; 
            background: #25d366; 
            color: #000; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 16px; 
            font-weight: bold; 
            margin-top: 15px; 
            transition: background 0.3s; 
        }
        button:hover { background: #1ebd5d; }
        
        .result-box { 
            margin-top: 25px; 
            padding: 20px; 
            background: #252525; 
            border: 1px solid #333; 
            border-radius: 10px; 
            display: none; 
            text-align: center; 
        }
        .price { font-size: 1.6em; color: #25d366; font-weight: bold; display: block; margin: 10px 0; }
        
        .note { font-size: 0.8em; color: #777; margin-top: 20px; line-height: 1.5; border-top: 1px solid #333; padding-top: 15px; }
        .wa-link { color: #25d366; font-weight: bold; text-decoration: none; }
        
        /* Tombol WhatsApp Mengambang */
        .wa-float { position: fixed; bottom: 30px; right: 30px; z-index: 100; transition: transform 0.3s; }
        .wa-float:hover { transform: scale(1.1); }
        .wa-float img { width: 60px; height: 60px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Estimasi Biaya Gorden</h2>
    <label>Masukkan Lebar Jendela (Meter):</label>
    <input type="number" id="lebar" step="0.1" placeholder="Contoh: 1.5">
    
    <button onclick="hitung()">Hitung Estimasi</button>

    <div class="result-box" id="hasil">
        Estimasi Biaya:
        <span class="price" id="totalHarga"></span>
        <p style="font-size: 0.9em; color: #ccc;">
            Ini adalah estimasi awal untuk kualitas bahan terbaik kami.
        </p>
        <a href="https://wa.me/6289504215020?text=Halo,%20saya%20sudah%20hitung%20estimasi%20gorden.%20Bisa%20dibantu%20tampilkan%20katalog%20bahan%20atau%20pilihan%20model%20lainnya?" 
           class="wa-link" target="_blank">Chat Admin untuk Konsultasi</a>
    </div>

    <div class="note">
        <p><i>* Harga dapat berubah tergantung model dan jenis bahan.</i></p>
        <p><i>* Harga sudah termasuk biaya aksesoris (hook, tali, rell) dan jasa instalasi.</i></p>
    </div>
</div>

<a href="https://wa.me/6289504215020" class="wa-float" target="_blank">
    <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp">
</a>

<script>
    function hitung() {
        let L = parseFloat(document.getElementById('lebar').value);
        if (isNaN(L) || L <= 0) {
            alert("Silakan masukkan lebar yang valid");
            return;
        }

        let L_hitung = L < 1 ? 1 : L;
        
        let kain = (L + 0.2) * 3 * 150000;
        let jahit = (L + 0.2) * 3 * 20000;
        let rell = L_hitung * 50000;
        let hook = 40000;
        let tali = 38000;
        let instalasi = L_hitung * 50000;

        let total = kain + jahit + rell + hook + tali + instalasi;

        document.getElementById('totalHarga').innerHTML = "Mulai dari Rp " + Math.round(total).toLocaleString('id-ID');
        document.getElementById('hasil').style.display = 'block';
    }
</script>

</body>
</html>
