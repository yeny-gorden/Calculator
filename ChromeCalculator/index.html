<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Gorden Pro v7.5</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#bb86fc">
    <link rel="apple-touch-icon" href="logo.png">
    <link rel="icon" type="image/png" href="logo.png">

    <style>
        :root {
            --bg: #121212; --card: #1e1e1e; --accent: #bb86fc; --text: #e0e0e0;
            --border: #333; --input: #2d2d2d; --success: #03dac6; --danger: #cf6679;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; padding-bottom: 50px; }
        .container { max-width: 600px; margin: auto; }
        .card { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 15px; position: relative; }
        h3 { margin: 0 0 15px 0; color: var(--accent); font-size: 1.1rem; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
        
        .input-logo { display: block; max-width: 60px; height: auto; margin: 0 auto 15px auto; border-radius: 8px; }
        .row { display: flex; gap: 8px; margin-bottom: 12px; }
        .col { flex: 1; display: flex; flex-direction: column; min-width: 0; }
        
        label { font-size: 0.7rem; color: #ffffff; margin-bottom: 4px; text-transform: uppercase; }
        input, select { background: var(--input); border: 1px solid var(--border); color: white; padding: 10px; border-radius: 6px; font-size: 0.9rem; width: 100%; box-sizing: border-box; }
        
        .btn { background: var(--accent); color: #000; border: none; padding: 12px; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 5px; }
        .btn-view { background: #333; color: var(--accent); border: 1px solid var(--accent); padding: 6px; font-size: 0.7rem; border-radius: 5px; cursor: pointer; margin-top: 5px; }
        .btn-del { color: var(--danger); background: none; border: none; cursor: pointer; font-size: 0.7rem; text-decoration: underline; }
        .btn-print { background: #444; color: white; margin-top: 10px; width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }

        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; background: #1a1a1a; margin-bottom: 10px; }
        th, td { padding: 10px 8px; border: 1px solid var(--border); text-align: left; }
        
        .total-box { background: #252525; padding: 15px; border-radius: 8px; margin-top: 10px; border-left: 4px solid var(--success); display: flex; justify-content: space-between; }
        .group-header { background: #2a2a2a; font-weight: bold; color: var(--accent); padding: 8px; border: 1px solid var(--border); margin-top: 15px; }

        /* Modal */
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); }
        .modal-cont { background: var(--card); margin: 10% auto; padding: 20px; border: 1px solid var(--accent); width: 85%; max-width: 400px; border-radius: 12px; }

        #boxExtraVit { display: none; margin-top: 10px; border-top: 1px dashed var(--border); padding-top: 10px; }

        /* Hidden Frame untuk Cetak */
        #printFrame { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="card-konsumen" class="card">
        <h3>Data Konsumen</h3>
        <div class="row">
            <div class="col"><label>Nama *</label><input type="text" id="custNama" placeholder="Nama"></div>
            <div class="col"><label>Telp *</label><input type="number" id="custTelp" placeholder="08xx"></div>
        </div>
        <div class="row">
            <div class="col"><label>Alamat *</label><input type="text" id="custAlamat" placeholder="Alamat"></div>
        </div>
    </div>

    <div id="input-section" class="card">
        <img src="logo.png" alt="Logo" class="input-logo">
        <h3>Input Pesanan</h3>
        <div class="row">
            <div class="col"><label>Kategori</label><select id="kategori" onchange="toggleKategori()"><option value="gorden">GORDEN</option><option value="blinds">BLINDS</option></select></div>
            <div class="col"><label>Bahan</label><select id="jenis"><option value="impor">Impor</option><option value="lokal">Lokal</option></select></div>
        </div>
        <div class="row">
            <div class="col"><label>L (m)</label><input type="number" id="L" step="0.1" placeholder="0.7"></div>
            <div class="col"><label>T (m)</label><input type="number" id="T" step="0.1" placeholder="2.0"></div>
            <div class="col gorden-only"><label>Panel</label><input type="number" id="pnl" value="1"></div>
        </div>
        <div class="row">
            <div class="col"><label id="lblBarang">Nama Kain</label><input type="text" id="nKain" placeholder="..."></div>
            <div class="col"><label id="lblHarga">Harga /m</label><input type="number" id="hKain" placeholder="0"></div>
        </div>
        
        <div class="gorden-only">
            <div class="row">
                <div class="col"><label>Vitrase?</label><select id="optVit" onchange="toggleVit()"><option value="no">Tidak</option><option value="yes">Pakai</option></select></div>
                <div class="col"><label id="lblMV" style="display:none">Model Vitras</label><select id="modelVit" style="display:none" onchange="toggleSpiral()"><option value="plisket">Plisket</option><option value="spiral">Spiral</option></select></div>
            </div>
        </div>

        <div id="boxExtraVit">
            <div class="row">
                <div class="col"><label>L Sp</label><input type="number" id="Lv" step="0.1" value="0.5"></div>
                <div class="col"><label>T Sp</label><input type="number" id="Tv" step="0.1" value="1.6"></div>
                <div class="col"><label>Qty Sp</label><input type="number" id="qtyV" value="2"></div>
            </div>
        </div>

        <button class="btn" onclick="hitung()">TAMBAH KE DAFTAR</button>
    </div>

    <div id="result"></div>
</div>

<iframe id="printFrame" name="printFrame"></iframe>

<script>
    let db = [];
    const B = { smokring: 4500, rollet: 65000, rell: 50000, stick: 50000, hook: 40000, tali: 38000, jahit: 20000, pasang: 50000 };

    function toggleKategori() {
        const isB = document.getElementById('kategori').value === 'blinds';
        document.querySelectorAll('.gorden-only').forEach(el => el.style.display = isB ? 'none' : 'block');
    }

    function toggleVit() {
        const s = document.getElementById('optVit').value === 'yes';
        document.getElementById('modelVit').style.display = s ? 'block' : 'none';
        document.getElementById('lblMV').style.display = s ? 'block' : 'none';
        toggleSpiral();
    }

    function toggleSpiral() {
        const isSpiral = document.getElementById('modelVit').value === 'spiral' && document.getElementById('optVit').value === 'yes';
        document.getElementById('boxExtraVit').style.display = isSpiral ? 'block' : 'none';
    }

    function hitung() {
        const cNama = document.getElementById('custNama').value;
        if(!cNama) { alert("Isi nama!"); return; }

        const kat = document.getElementById('kategori').value;
        const L = parseFloat(document.getElementById('L').value) || 0;
        const T = parseFloat(document.getElementById('T').value) || 0;
        const hK = parseFloat(document.getElementById('hKain').value) || 0;
        
        let dataItem = { kat, L, T, nK: document.getElementById('nKain').value, total: 0, detailHTML: "", panel: document.getElementById('pnl').value };

        // Logika sederhana hitung total
        dataItem.total = (kat === 'blinds') ? (L*T*hK) + 50000 : (L*3*hK) + 150000;
        
        db.push(dataItem); 
        render();
    }

    function render() {
        let h = "";
        db.forEach((d, i) => {
            h += `<div class="card"><b>Item ${i+1}: ${d.nK}</b><br>Total: Rp ${d.total.toLocaleString()}<br><button class="btn-del" onclick="db.splice(${i},1);render()">Hapus</button></div>`;
        });
        if(db.length > 0) {
            h += `<button class="btn-print" onclick="prosesCetak('estimasi')">CETAK ESTIMASI</button>`;
            h += `<button class="btn-print" onclick="prosesCetak('spk')">CETAK SPK</button>`;
        }
        document.getElementById('result').innerHTML = h;
    }

    function prosesCetak(tipe) {
        const cNama = document.getElementById('custNama').value;
        const cTelp = document.getElementById('custTelp').value;
        const cAlamat = document.getElementById('custAlamat').value;
        const tgl = new Date().toLocaleDateString('id-ID');
        
        let barisTable = "";
        db.forEach((d, i) => {
            barisTable += `<tr><td>Jendela ${i+1}<br><small>${d.nK} (${d.L}x${d.T}m)</small></td><td align="right">${d.total.toLocaleString()}</td></tr>`;
        });

        const htmlCetak = `
            <html>
            <head>
                <style>
                    body { font-family: sans-serif; color: black; margin: 0; padding: 20px; }
                    .header { display: flex; align-items: flex-start; gap: 15px; border-bottom: 2px solid black; padding-bottom: 10px; margin-bottom: 20px; }
                    .logo { width: 80px; height: auto; }
                    .info { flex: 1; font-size: 12px; }
                    table { width: 100%; border-collapse: collapse; }
                    th, td { border: 1px solid black; padding: 8px; font-size: 12px; }
                    .footer { margin-top: 15px; font-size: 11px; color: red; font-weight: bold; }
                </style>
            </head>
            <body>
                <div class="header">
                    <img src="logo.png" class="logo">
                    <div class="info">
                        <strong>${tipe === 'estimasi' ? 'PENERIMA' : 'PESANAN'}:</strong> ${cNama} (${cTelp})<br>
                        <strong>ALAMAT:</strong> ${cAlamat}<br>
                        <span>Tanggal: ${tgl}</span>
                    </div>
                </div>
                <h3>${tipe.toUpperCase()} HARGA</h3>
                <table>
                    <thead><tr><th>Deskripsi</th><th>Total (Rp)</th></tr></thead>
                    <tbody>${barisTable}</tbody>
                </table>
                ${tipe === 'estimasi' ? '<div class="footer">* Berlaku 7 hari sejak tanggal cetak</div>' : ''}
            </body>
            </html>
        `;

        const frame = document.getElementById('printFrame');
        const doc = frame.contentWindow.document;
        doc.open();
        doc.write(htmlCetak);
        doc.close();

        // Beri waktu browser memproses konten frame sebelum print
        setTimeout(() => {
            frame.contentWindow.focus();
            frame.contentWindow.print();
        }, 500);
    }
</script>
</body>
</html>
