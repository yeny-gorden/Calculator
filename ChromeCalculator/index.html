<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Gorden Pro</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#bb86fc">

    <style>
        /* TATA LETAK ASLI ANDA */
        :root {
            --bg: #121212; --card: #1e1e1e; --accent: #bb86fc; --text: #e0e0e0;
            --border: #333; --input: #2d2d2d; --success: #03dac6; --danger: #cf6679;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; padding-bottom: 50px; }
        .container { max-width: 600px; margin: auto; }
        .card { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 15px; position: relative; }
        h3 { margin: 0 0 15px 0; color: var(--accent); font-size: 1.1rem; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
        
        .input-logo { display: block; max-width: 60px; height: auto; margin: 0 auto 15px auto; border-radius: 8px; }
        .row { display: flex; gap: 8px; margin-bottom: 12px; }
        .col { flex: 1; display: flex; flex-direction: column; min-width: 0; }
        
        label { font-size: 0.7rem; color: #ffffff; margin-bottom: 4px; text-transform: uppercase; }
        input, select { background: var(--input); border: 1px solid var(--border); color: white; padding: 10px; border-radius: 6px; font-size: 0.9rem; width: 100%; box-sizing: border-box; }
        
        .btn { background: var(--accent); color: #000; border: none; padding: 12px; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 5px; }
        .btn-view { background: #333; color: var(--accent); border: 1px solid var(--accent); padding: 6px; font-size: 0.7rem; border-radius: 5px; cursor: pointer; margin-top: 5px; width: 100%; }
        .btn-del { color: var(--danger); background: none; border: none; cursor: pointer; font-size: 0.7rem; text-decoration: underline; margin-bottom: 5px; }
        .btn-print { background: #444; color: white; margin-top: 10px; width: 100%; padding: 10px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; }

        /* MODAL KHUSUS CETAK (Agar tidak putih polos) */
        .modal-print { display: none; position: fixed; inset: 0; background: white; z-index: 9999; color: black; padding: 20px; overflow-y: auto; }
        .print-header { display: flex; align-items: flex-start; gap: 20px; border-bottom: 2px solid black; padding-bottom: 15px; margin-bottom: 15px; }
        .print-logo { max-width: 100px; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 15px; }
        th, td { border: 1px solid black; padding: 8px; text-align: left; font-size: 0.9rem; }
        .total-box-print { border: 2px solid black; padding: 10px; text-align: right; font-weight: bold; margin-top: 10px; }

        /* CSS MEDIA PRINT */
        @media print {
            .no-print { display: none !important; }
            .modal-print { display: block !important; position: static !important; inset: auto !important; background: white !important; }
            body { background: white !important; }
        }
    </style>
</head>
<body>

<div class="container no-print">
    <div class="card">
        <h3>Data Konsumen</h3>
        <div class="row">
            <div class="col"><label>Nama *</label><input type="text" id="custNama" placeholder="Nama"></div>
            <div class="col"><label>No. Telp *</label><input type="number" id="custTelp" placeholder="08xx"></div>
        </div>
        <div class="row">
            <div class="col"><label>Alamat *</label><input type="text" id="custAlamat" placeholder="Alamat"></div>
        </div>
    </div>

    <div class="card">
        <img src="logo.png" class="input-logo">
        <h3>Input Pesanan</h3>
        <div class="row">
            <div class="col"><label>Kategori</label><select id="kategori"><option value="gorden">GORDEN</option><option value="blinds">BLINDS</option></select></div>
            <div class="col"><label>Bahan</label><select id="jenis"><option value="impor">Impor</option><option value="lokal">Lokal</option></select></div>
        </div>
        <div class="row">
            <div class="col"><label>L (m)</label><input type="number" id="L" step="0.1" placeholder="0.0"></div>
            <div class="col"><label>T (m)</label><input type="number" id="T" step="0.1" placeholder="0.0"></div>
        </div>
        <div class="row">
            <div class="col"><label>Nama Barang</label><input type="text" id="nKain" placeholder="Nama Kain"></div>
            <div class="col"><label>Harga</label><input type="number" id="hKain" placeholder="0"></div>
        </div>
        <button class="btn" onclick="tambahDaftar()">TAMBAH KE DAFTAR</button>
    </div>

    <div id="result-list"></div>
</div>

<div id="modalPrint" class="modal-print">
    <div class="print-header">
        <img src="logo.png" class="print-logo">
        <div id="print-info-cust"></div>
    </div>
    <h3 id="print-title" style="color:black; text-align:center; border:none"></h3>
    <table id="print-table"></table>
    <div id="print-total" class="total-box-print"></div>
    <div id="print-footer" style="color:red; font-size:0.8rem; margin-top:10px"></div>
    
    <div class="no-print" style="margin-top:20px; display:flex; gap:10px">
        <button class="btn" style="background:black; color:white" onclick="window.print()">KONFIRMASI CETAK</button>
        <button class="btn" style="background:#ccc; color:black" onclick="tutupCetak()">BATAL</button>
    </div>
</div>

<script>
    let db = [];

    function tambahDaftar() {
        const item = {
            nama: document.getElementById('nKain').value || "Item",
            L: document.getElementById('L').value,
            T: document.getElementById('T').value,
            harga: parseFloat(document.getElementById('hKain').value) || 0,
            subtotal: 0
        };
        item.subtotal = item.L * item.T * item.harga; // Contoh hitung sederhana
        db.push(item);
        renderDaftar();
    }

    function renderDaftar() {
        let html = "";
        let total = 0;
        db.forEach((d, i) => {
            html += `<div class="card">
                <b>${d.nama} (${d.L}x${d.T}m)</b><br>
                Rp ${d.subtotal.toLocaleString()}<br>
                <button class="btn-del" onclick="db.splice(${i},1);renderDaftar()">Hapus</button>
            </div>`;
            total += d.subtotal;
        });
        if(db.length > 0) {
            html += `<div class="card" style="text-align:center"><h3>Total: Rp ${total.toLocaleString()}</h3>
                <button class="btn-print" onclick="bukaCetak('estimasi')">CETAK ESTIMASI</button>
                <button class="btn-print" onclick="bukaCetak('spk')">CETAK SPK</button></div>`;
        }
        document.getElementById('result-list').innerHTML = html;
    }

    function bukaCetak(tipe) {
        const cNama = document.getElementById('custNama').value;
        const cTelp = document.getElementById('custTelp').value;
        const tgl = new Date().toLocaleDateString('id-ID');

        document.getElementById('print-info-cust').innerHTML = `
            <strong>Penerima:</strong> ${cNama} (${cTelp})<br>
            <strong>Tanggal:</strong> ${tgl}
        `;
        document.getElementById('print-title').innerText = tipe.toUpperCase();
        
        let tableHtml = "<tr><th>Item</th><th>Total</th></tr>";
        let total = 0;
        db.forEach(d => {
            tableHtml += `<tr><td>${d.nama} (${d.L}x${d.T}m)</td><td>Rp ${d.subtotal.toLocaleString()}</td></tr>`;
            total += d.subtotal;
        });
        
        document.getElementById('print-table').innerHTML = tableHtml;
        document.getElementById('print-total').innerText = "GRAND TOTAL: Rp " + total.toLocaleString();
        document.getElementById('print-footer').innerText = (tipe === 'estimasi') ? "* Berlaku 7 hari sejak tanggal cetak" : "";
        
        document.getElementById('modalPrint').style.display = 'block';
        window.scrollTo(0,0);
    }

    function tutupCetak() {
        document.getElementById('modalPrint').style.display = 'none';
    }
</script>

</body>
</html>
